<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deezer | Mobilité</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/nous contacter.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="img/Logo Deezer Mobilité.png" alt="Logo Deezer Mobilité" class="logo-img">
        </div>
        <nav>
            <a href="index.html" class="nav-link">Accueil</a>
            <a href="nous contacter.html" class="nav-link">Nous contacter</a>
            <a href="conducteur.html" class="btn btn-blanc">Conducteur</a>
            <a href="passager.html" class="btn btn-violet">Passager</a>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h1>Contactez-nous</h1>
            <p class="form-description">Une question sur un trajet ? Un problème technique ? Écrivez-nous.</p>
            
            <form action="#" method="post">
                <div class="form-grid">
                    
                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" name="nom" placeholder="Votre nom">
                    </div>

                    <div class="form-group">
                        <label for="prenom">Prénom</label>
                        <input type="text" id="prenom" name="prenom" placeholder="Votre prénom">
                    </div>

                    <div class="form-group full-width">
                        <label for="email">Email professionnel</label>
                        <input type="email" id="email" name="email" placeholder="exemple@deezer.com">
                    </div>

                    <div class="form-group full-width">
                        <label for="objet">Objet de la demande</label>
                        <select id="objet" name="objet">
                            <option value="">-- Sélectionnez un sujet --</option>
                            <option value="compte">Problème de compte</option>
                            <option value="trajet">Question sur un trajet</option>
                            <option value="bug">Signaler un bug</option>
                            <option value="autre">Autre</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label for="message">Votre message</label>
                        <textarea id="message" name="message" placeholder="Détaillez votre demande ici..."></textarea>
                    </div>

                </div>

                <div class="submit-container">
                    <button type="submit" class="btn-submit">Envoyer le message</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div>© 2023 Deezer Mobilité</div>
        <a href="https://www.deezer.com/legal/personal-datas">RGPD & données personnelles</a>
    </footer>

</body>
</html>
